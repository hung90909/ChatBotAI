<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Trợ Lý AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #ff6b6b;
    --c2: #f7c948;
    --c3: #4ecdc4;
    --c4: #a855f7;
    --c5: #3b82f6;
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, rgba(168,85,247,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(78,205,196,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 60% 20%, rgba(59,130,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 80% 30% at 10% 80%, rgba(255,107,107,0.1) 0%, transparent 60%);
    animation: bgShift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgShift {
    0%   { opacity: 1; filter: hue-rotate(0deg); }
    50%  { opacity: 0.7; filter: hue-rotate(30deg); }
    100% { opacity: 1; filter: hue-rotate(-20deg); }
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--c4), var(--c5));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(168,85,247,0.5);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.5); }
    50% { box-shadow: 0 0 35px rgba(168,85,247,0.8), 0 0 60px rgba(59,130,246,0.3); }
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    background: linear-gradient(90deg, var(--c4), var(--c3), var(--c2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 99px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c3);
    box-shadow: 0 0 8px var(--c3);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Welcome state */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease both;
  }

  .welcome-emoji {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text), var(--c4), var(--c3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    letter-spacing: -0.03em;
  }

  .welcome p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 28px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 99px;
    font-size: 0.83rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: rgba(168,85,247,0.15);
    border-color: rgba(168,85,247,0.4);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(168,85,247,0.2);
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.4s ease both;
    max-width: 100%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    align-self: flex-end;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--c4), var(--c5));
    box-shadow: 0 0 15px rgba(168,85,247,0.4);
  }

  .avatar.user {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    box-shadow: 0 0 15px rgba(255,107,107,0.35);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.65;
    position: relative;
  }

  .message.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: linear-gradient(135deg, rgba(168,85,247,0.35), rgba(59,130,246,0.25));
    border: 1px solid rgba(168,85,247,0.3);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c4);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; background: var(--c5); }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; background: var(--c3); }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 0 20px;
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .input-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(59,130,246,0.04));
    pointer-events: none;
  }

  .input-wrapper:focus-within {
    border-color: rgba(168,85,247,0.45);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.1), 0 0 30px rgba(168,85,247,0.12);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    line-height: 1.5;
    resize: none;
    max-height: 140px;
    min-height: 24px;
    padding: 4px 0;
  }

  #user-input::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--c4), var(--c5));
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(168,85,247,0.4);
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 25px rgba(168,85,247,0.6);
  }

  .send-btn:active { transform: scale(0.95); }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg {
    width: 18px; height: 18px;
  }

  .footer-note {
    text-align: center;
    font-size: 0.72rem;
    color: rgba(240,238,255,0.25);
    margin-top: 10px;
    letter-spacing: 0.02em;
  }

  /* Code blocks */
  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px;
    overflow-x: auto;
    font-size: 0.82rem;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
  }

  .bubble code {
    font-family: 'Courier New', monospace;
    background: rgba(168,85,247,0.15);
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 0.85em;
  }

  .bubble pre code {
    background: none;
    padding: 0;
  }

  /* Clear button */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 99px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .clear-btn:hover {
    border-color: rgba(255,107,107,0.4);
    color: var(--c1);
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">NOVA</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="clear-btn" onclick="clearChat()">Xóa chat</button>
      <div class="status-badge">
        <div class="status-dot"></div>
        Đang hoạt động
      </div>
    </div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome-screen">
      <span class="welcome-emoji">✦</span>
      <h2>Xin chào! Tôi là NOVA</h2>
      <p>Trợ lý AI thông minh, sẵn sàng hỗ trợ bạn mọi lúc — từ giải đáp thắc mắc, viết lách đến phân tích và sáng tạo.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🌤️ Thời tiết Hà Nội hôm nay?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Viết email xin nghỉ phép</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🧠 Giải thích AI là gì?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🍜 Gợi ý món ăn ngon Hà Nội</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 Ý tưởng kinh doanh online</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="Hỏi bất cứ điều gì..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="footer-note">NOVA · Powered by Claude AI · Trả lời có thể sai — hãy kiểm tra lại thông tin quan trọng</div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let conversationHistory = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.trim().replace(/^[^\s]+\s/, '');
    sendMessage();
  }

  function clearChat() {
    conversationHistory = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome-screen">
        <span class="welcome-emoji">✦</span>
        <h2>Xin chào! Tôi là NOVA</h2>
        <p>Trợ lý AI thông minh, sẵn sàng hỗ trợ bạn mọi lúc — từ giải đáp thắc mắc, viết lách đến phân tích và sáng tạo.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">🌤️ Thời tiết Hà Nội hôm nay?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Viết email xin nghỉ phép</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">🧠 Giải thích AI là gì?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">🍜 Gợi ý món ăn ngon Hà Nội</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 Ý tưởng kinh doanh online</button>
        </div>
      </div>`;
  }

  function appendMessage(role, content) {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '✦' : '🧑';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatMessage(content);

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  function formatMessage(text) {
    // Code blocks
    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
      headers: {
  'Content-Type': 'application/json',
  'x-api-key': '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', // thay bằng key của bạn
  'anthropic-version': '2023-06-01',
  'anthropic-dangerous-direct-browser-access': 'true'
},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Bạn là NOVA — một trợ lý AI thông minh, thân thiện và hữu ích. Bạn trả lời bằng tiếng Việt, ngắn gọn, rõ ràng và tự nhiên. Ngày hôm nay: ${new Date().toLocaleDateString('vi-VN', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}.`,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        appendMessage('ai', reply);
      } else {
        appendMessage('ai', '⚠️ Có lỗi xảy ra, vui lòng thử lại.');
      }
    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠️ Không thể kết nối. Vui lòng kiểm tra kết nối mạng và thử lại.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
